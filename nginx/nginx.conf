limit_req_zone $binary_remote_addr zone=api_general:10m rate=20r/s;
limit_req_zone $binary_remote_addr zone=auth_login:10m rate=5r/m;
limit_req_zone $binary_remote_addr zone=vote_cast:10m rate=10r/m;
limit_conn_zone $binary_remote_addr zone=per_ip:10m;

server {
  listen 8080;
  server_name _;

  access_log /dev/stdout;
  error_log /dev/stderr warn;
  server_tokens off;

  client_max_body_size 100k;
  client_body_timeout 10s;
  client_header_timeout 10s;
  send_timeout 10s;

  gzip on;
  gzip_comp_level 5;
  gzip_min_length 1024;
  gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

  add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
  add_header X-Frame-Options "DENY" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
  add_header Cross-Origin-Opener-Policy "same-origin" always;
  add_header Cross-Origin-Resource-Policy "same-site" always;
  add_header Content-Security-Policy "default-src 'self'; base-uri 'self'; frame-ancestors 'none'; object-src 'none'; img-src 'self' data:; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline'; connect-src 'self' https: wss:" always;

  limit_conn per_ip 20;

  location = /nginx-health {
    access_log off;
    return 200 "ok\n";
  }

  location /api/ {
    limit_req zone=api_general burst=60 delay=20;

    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
    proxy_read_timeout 60s;
    proxy_send_timeout 60s;

    add_header Cache-Control "no-store" always;
    proxy_pass http://${API_UPSTREAM};
  }

  location = /api/v1/auth/login {
    limit_req zone=auth_login burst=10 nodelay;

    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;

    add_header Cache-Control "no-store" always;
    proxy_pass http://${API_UPSTREAM};
  }

  location ~ ^/api/v1/elections/[^/]+/votes$ {
    limit_req zone=vote_cast burst=20 delay=5;

    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;

    add_header Cache-Control "no-store" always;
    proxy_pass http://${API_UPSTREAM};
  }

  location / {
    return 404;
  }

  location ~ /\. {
    deny all;
  }
}