worker_processes auto;
pid /tmp/nginx.pid;

events {
  worker_connections 1024;
}

# TCP proxy for MongoDB: encrypts backend<->DB traffic using TLS to the upstream.
# The API connects to this proxy locally (same Pod/host) on port 27018.
stream {
  upstream mongo_upstream {
    server mongo:27017;
  }

  server {
    listen 27018;

    proxy_pass mongo_upstream;
    proxy_connect_timeout 5s;
    proxy_timeout 1h;

    # TLS to MongoDB upstream (protects internal transit on the network).
    proxy_ssl on;
    proxy_ssl_server_name on;
    proxy_ssl_name mongo;
    proxy_ssl_trusted_certificate /etc/nginx/mongo-ca/ca.crt;
    proxy_ssl_verify on;
    proxy_ssl_verify_depth 2;
  }
}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;

  server_tokens off;

  # Logs to stdout/stderr for container platforms (Kubernetes/Render).
  access_log /dev/stdout;
  error_log /dev/stderr warn;

  sendfile on;
  tcp_nopush on;
  tcp_nodelay on;
  keepalive_timeout 65;

  client_body_timeout 10s;
  client_header_timeout 10s;
  send_timeout 10s;
  client_max_body_size 100k;

  gzip on;
  gzip_comp_level 5;
  gzip_min_length 1024;
  gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

  map $http_x_forwarded_for $client_ip {
    ~^(?<first>[^,]+) $first;
    default $remote_addr;
  }

  map $http_x_forwarded_proto $forwarded_proto {
    default $http_x_forwarded_proto;
    "" $scheme;
  }

  # Rate limiting / concurrency (mirrors the edge config).
  limit_req_status 429;
  limit_req_zone $client_ip zone=api_general:10m rate=20r/s;
  limit_req_zone $client_ip zone=auth_login:10m rate=5r/m;
  limit_req_zone $client_ip zone=vote_cast:10m rate=10r/m;
  limit_conn_zone $client_ip zone=per_ip:10m;

  upstream api_upstream {
    server 127.0.0.1:3100;
    keepalive 32;
  }

  server {
    listen 8080;
    server_name _;

    # If a proxy in front tells us the request arrived over plain HTTP, redirect to HTTPS.
    if ($http_x_forwarded_proto = "http") {
      return 301 https://$host$request_uri;
    }

    # Security headers (same intent as the edge config).
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header Cross-Origin-Resource-Policy "same-site" always;
    add_header Content-Security-Policy "default-src 'self'; base-uri 'self'; frame-ancestors 'none'; object-src 'none'; img-src 'self' data:; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' data: https://fonts.gstatic.com; script-src 'self' 'unsafe-inline'; connect-src 'self' https: wss:; upgrade-insecure-requests" always;

    limit_conn per_ip 20;

    location = /nginx-health {
      access_log off;
      return 200 "ok\n";
    }

    # Prometheus scrape endpoint (API also enforces METRICS_TOKEN).
    location = /metrics {
      allow 127.0.0.1;
      allow 10.0.0.0/8;
      allow 172.16.0.0/12;
      allow 192.168.0.0/16;
      deny all;

      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $client_ip;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $forwarded_proto;
      proxy_read_timeout 15s;

      proxy_pass http://api_upstream/metrics;
    }

    # Default API limits.
    location /api/ {
      limit_req zone=api_general burst=60 delay=20;

      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $client_ip;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $forwarded_proto;
      proxy_read_timeout 60s;
      proxy_send_timeout 60s;

      add_header Cache-Control "no-store" always;
      proxy_pass http://api_upstream;
    }

    # Brute-force protection on login.
    location = /api/v1/auth/login {
      limit_req zone=auth_login burst=10 nodelay;

      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $client_ip;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $forwarded_proto;

      add_header Cache-Control "no-store" always;
      proxy_pass http://api_upstream;
    }

    # Rate limit vote casting more aggressively.
    location ~ ^/api/v1/elections/[^/]+/votes$ {
      limit_req zone=vote_cast burst=20 delay=5;

      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $client_ip;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $forwarded_proto;

      add_header Cache-Control "no-store" always;
      proxy_pass http://api_upstream;
    }

    location / {
      return 404;
    }

    location ~ /\. {
      deny all;
    }
  }
}
