apiVersion: v1
kind: ConfigMap
metadata:
  name: votehub-mongo-init
  namespace: votehub
data:
  mongo-init.js: |
    const dbName = process.env.MONGO_INITDB_DATABASE || "votehub";
    const appUser = process.env.MONGO_APP_USER || "votehub";
    const appPass = process.env.MONGO_APP_PASS || "votehub_password_change_me";

    db = db.getSiblingDB(dbName);

    try {
      db.createUser({
        user: appUser,
        pwd: appPass,
        roles: [{ role: "readWrite", db: dbName }]
      });
    } catch (error) {
      console.log(`User ${appUser} already exists, skipping creation.`);
    }
---
apiVersion: v1
kind: Service
metadata:
  name: mongo
  namespace: votehub
spec:
  clusterIP: None
  selector:
    app: votehub-mongo
  ports:
    - name: mongo
      port: 27017
      targetPort: 27017
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mongo
  namespace: votehub
spec:
  serviceName: mongo
  replicas: 1
  selector:
    matchLabels:
      app: votehub-mongo
  template:
    metadata:
      labels:
        app: votehub-mongo
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: mongo
          image: mongo:7
          ports:
            - containerPort: 27017
              name: mongo
          envFrom:
            - secretRef:
                name: votehub-mongo-secrets
          command: ["mongod"]
          args:
            - "--bind_ip_all"
            - "--auth"
            - "--tlsMode=requireTLS"
            - "--tlsCertificateKeyFile=/etc/mongo-tls/tls.pem"
            - "--tlsCAFile=/etc/mongo-tls/ca.crt"
          volumeMounts:
            - name: mongo-data
              mountPath: /data/db
            - name: mongo-init
              mountPath: /docker-entrypoint-initdb.d/mongo-init.js
              subPath: mongo-init.js
              readOnly: true
            - name: mongo-tls
              mountPath: /etc/mongo-tls
              readOnly: true
          readinessProbe:
            exec:
              command:
                - sh
                - -ec
                - >
                  mongosh --tls
                  --tlsCAFile /etc/mongo-tls/ca.crt
                  --username "$MONGO_INITDB_ROOT_USERNAME"
                  --password "$MONGO_INITDB_ROOT_PASSWORD"
                  --authenticationDatabase admin
                  --eval "db.adminCommand('ping')"
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 12
          livenessProbe:
            exec:
              command:
                - sh
                - -ec
                - >
                  mongosh --tls
                  --tlsCAFile /etc/mongo-tls/ca.crt
                  --username "$MONGO_INITDB_ROOT_USERNAME"
                  --password "$MONGO_INITDB_ROOT_PASSWORD"
                  --authenticationDatabase admin
                  --eval "db.adminCommand('ping')"
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 6
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1"
              memory: "1Gi"
      volumes:
        - name: mongo-init
          configMap:
            name: votehub-mongo-init
        - name: mongo-tls
          secret:
            secretName: votehub-mongo-tls
  volumeClaimTemplates:
    - metadata:
        name: mongo-data
      spec:
        accessModes: ["ReadWriteOnce"]
        # Use an encrypted StorageClass/PV (provider-managed) for encryption-at-rest.
        resources:
          requests:
            storage: 10Gi

