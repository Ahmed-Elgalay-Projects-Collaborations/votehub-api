apiVersion: v1
kind: ConfigMap
metadata:
  name: votehub-api-config
  namespace: votehub
data:
  NODE_ENV: "production"
  PORT: "3100"
  TRUST_PROXY: "2"
  ENABLE_METRICS: "true"
  METRICS_REQUIRE_AUTH: "true"
  LOG_TO_CONSOLE: "true"
  LOG_TO_FILE: "false"
  CLIENT_URL: "https://app.votehub.example"
  API_BASE_URL: "https://api.votehub.example"
  CORS_ORIGINS: "https://app.votehub.example"
  COOKIE_SECURE: "true"
  COOKIE_SAMESITE: "lax"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: votehub-api-nginx
  namespace: votehub
data:
  nginx.conf: |
    worker_processes auto;
    pid /tmp/nginx.pid;

    events { worker_connections 1024; }

    stream {
      upstream mongo_upstream { server mongo:27017; }

      server {
        listen 27018;
        proxy_pass mongo_upstream;
        proxy_connect_timeout 5s;
        proxy_timeout 1h;

        proxy_ssl on;
        proxy_ssl_server_name on;
        proxy_ssl_name mongo;
        proxy_ssl_trusted_certificate /etc/nginx/mongo-ca/ca.crt;
        proxy_ssl_verify on;
        proxy_ssl_verify_depth 2;
      }
    }

    http {
      include /etc/nginx/mime.types;
      default_type application/octet-stream;
      server_tokens off;
      access_log /dev/stdout;
      error_log /dev/stderr warn;

      sendfile on;
      tcp_nopush on;
      tcp_nodelay on;
      keepalive_timeout 65;

      client_body_timeout 10s;
      client_header_timeout 10s;
      send_timeout 10s;
      client_max_body_size 100k;

      gzip on;
      gzip_comp_level 5;
      gzip_min_length 1024;
      gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

      map $http_x_forwarded_for $client_ip {
        ~^(?<first>[^,]+) $first;
        default $remote_addr;
      }

      map $http_x_forwarded_proto $forwarded_proto {
        default $http_x_forwarded_proto;
        "" $scheme;
      }

      limit_req_status 429;
      limit_req_zone $client_ip zone=api_general:10m rate=20r/s;
      limit_req_zone $client_ip zone=auth_login:10m rate=5r/m;
      limit_req_zone $client_ip zone=vote_cast:10m rate=10r/m;
      limit_conn_zone $client_ip zone=per_ip:10m;

      upstream api_upstream { server 127.0.0.1:3100; keepalive 32; }

      server {
        listen 8080;
        server_name _;

        if ($http_x_forwarded_proto = "http") { return 301 https://$host$request_uri; }

        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
        add_header Cross-Origin-Opener-Policy "same-origin" always;
        add_header Cross-Origin-Resource-Policy "same-site" always;
        add_header Content-Security-Policy "default-src 'self'; base-uri 'self'; frame-ancestors 'none'; object-src 'none'; img-src 'self' data:; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline'; connect-src 'self' https: wss:; upgrade-insecure-requests" always;

        limit_conn per_ip 20;

        location = /nginx-health { access_log off; return 200 "ok\n"; }

        location = /metrics {
          allow 127.0.0.1;
          allow 10.0.0.0/8;
          allow 172.16.0.0/12;
          allow 192.168.0.0/16;
          deny all;

          proxy_http_version 1.1;
          proxy_set_header Host $host;
          proxy_set_header X-Real-IP $client_ip;
          proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
          proxy_set_header X-Forwarded-Proto $forwarded_proto;
          proxy_read_timeout 15s;
          proxy_pass http://api_upstream/metrics;
        }

        location /api/ {
          limit_req zone=api_general burst=60 delay=20;
          proxy_http_version 1.1;
          proxy_set_header Host $host;
          proxy_set_header X-Real-IP $client_ip;
          proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
          proxy_set_header X-Forwarded-Proto $forwarded_proto;
          proxy_read_timeout 60s;
          proxy_send_timeout 60s;
          add_header Cache-Control "no-store" always;
          proxy_pass http://api_upstream;
        }

        location = /api/v1/auth/login {
          limit_req zone=auth_login burst=10 nodelay;
          proxy_http_version 1.1;
          proxy_set_header Host $host;
          proxy_set_header X-Real-IP $client_ip;
          proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
          proxy_set_header X-Forwarded-Proto $forwarded_proto;
          add_header Cache-Control "no-store" always;
          proxy_pass http://api_upstream;
        }

        location ~ ^/api/v1/elections/[^/]+/votes$ {
          limit_req zone=vote_cast burst=20 delay=5;
          proxy_http_version 1.1;
          proxy_set_header Host $host;
          proxy_set_header X-Real-IP $client_ip;
          proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
          proxy_set_header X-Forwarded-Proto $forwarded_proto;
          add_header Cache-Control "no-store" always;
          proxy_pass http://api_upstream;
        }

        location ~ /\. { deny all; }
        location / { return 404; }
      }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: votehub
spec:
  replicas: 2
  revisionHistoryLimit: 10
  progressDeadlineSeconds: 120
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: votehub-api
  template:
    metadata:
      labels:
        app: votehub-api
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: api-nginx
          image: nginxinc/nginx-unprivileged:1.27-alpine
          ports:
            - name: http
              containerPort: 8080
            - name: mongo-proxy
              containerPort: 27018
          volumeMounts:
            - name: api-nginx
              mountPath: /etc/nginx/nginx.conf
              subPath: nginx.conf
              readOnly: true
            - name: mongo-ca
              mountPath: /etc/nginx/mongo-ca
              readOnly: true
          readinessProbe:
            httpGet:
              path: /nginx-health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /nginx-health
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 2
            failureThreshold: 3
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "250m"
              memory: "256Mi"

        - name: api
          image: your-acr-name.azurecr.io/votehub-api:v1
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3100
              name: node
          envFrom:
            - configMapRef:
                name: votehub-api-config
          env:
            - name: MONGO_APP_USER
              valueFrom:
                secretKeyRef:
                  name: votehub-mongo-secrets
                  key: MONGO_APP_USER
            - name: MONGO_APP_PASS
              valueFrom:
                secretKeyRef:
                  name: votehub-mongo-secrets
                  key: MONGO_APP_PASS
            - name: MONGO_URI
              value: "mongodb://$(MONGO_APP_USER):$(MONGO_APP_PASS)@127.0.0.1:27018/votehub?authSource=votehub"
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: votehub-api-secrets
                  key: JWT_SECRET
            - name: OTP_ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: votehub-api-secrets
                  key: OTP_ENCRYPTION_KEY
            - name: VOTE_ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: votehub-api-secrets
                  key: VOTE_ENCRYPTION_KEY
            - name: AUDIT_SIGNING_KEY
              valueFrom:
                secretKeyRef:
                  name: votehub-api-secrets
                  key: AUDIT_SIGNING_KEY
            - name: RECEIPT_SIGNING_KEY
              valueFrom:
                secretKeyRef:
                  name: votehub-api-secrets
                  key: RECEIPT_SIGNING_KEY
            - name: AUDIT_SALT
              valueFrom:
                secretKeyRef:
                  name: votehub-api-secrets
                  key: AUDIT_SALT
            - name: METRICS_TOKEN
              valueFrom:
                secretKeyRef:
                  name: votehub-api-secrets
                  key: METRICS_TOKEN
            - name: DEFAULT_ADMIN_EMAIL
              valueFrom:
                secretKeyRef:
                  name: votehub-api-secrets
                  key: DEFAULT_ADMIN_EMAIL
            - name: DEFAULT_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: votehub-api-secrets
                  key: DEFAULT_ADMIN_PASSWORD
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: 3100
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: 3100
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 2
            failureThreshold: 3
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "1"
              memory: "768Mi"
      volumes:
        - name: api-nginx
          configMap:
            name: votehub-api-nginx
        - name: mongo-ca
          secret:
            secretName: votehub-mongo-tls
            items:
              - key: ca.crt
                path: ca.crt
---
apiVersion: v1
kind: Service
metadata:
  name: api
  namespace: votehub
spec:
  selector:
    app: votehub-api
  ports:
    # Keep port 3100 to match existing frontend NGINX proxy config (http://api:3100).
    - name: http
      port: 3100
      targetPort: 8080
