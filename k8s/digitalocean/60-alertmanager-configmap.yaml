apiVersion: v1
kind: ConfigMap
metadata:
  name: votehub-alertmanager-config
  namespace: votehub
data:
  alertmanager.yml: |
    global:
      resolve_timeout: 5m

    route:
      group_by: ["alertname", "severity"]
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 2h
      receiver: default-null

    receivers:
      - name: default-null

    # Replace default-null with Slack/Email/Webhook receivers before production cutover.
