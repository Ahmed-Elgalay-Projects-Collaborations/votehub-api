apiVersion: v1
kind: ConfigMap
metadata:
  name: votehub-api-config
  namespace: votehub
data:
  NODE_ENV: "production"
  PORT: "3100"
  TRUST_PROXY: "1"

  CLIENT_URL: "https://votehub.me"
  API_BASE_URL: "https://votehub.me/api/v1"
  CORS_ORIGINS: "https://votehub.me"
  EMAIL_VERIFICATION_URL_BASE: "https://votehub.me/verify-email"

  ENABLE_COOKIE_AUTH: "true"
  COOKIE_SECURE: "true"
  COOKIE_SAMESITE: "lax"
  AUTH_COOKIE_NAME: "votehub_access_token"
  CSRF_COOKIE_NAME: "votehub_csrf_token"

  ENABLE_METRICS: "true"
  METRICS_REQUIRE_AUTH: "true"

  SMTP_CONNECTION_TIMEOUT_MS: "10000"
  SMTP_GREETING_TIMEOUT_MS: "10000"
  SMTP_SOCKET_TIMEOUT_MS: "15000"
  SMTP_DNS_TIMEOUT_MS: "10000"
  SMTP_IP_FAMILY: "4"

  LOG_TO_CONSOLE: "true"
  LOG_TO_FILE: "true"
  LOG_RETENTION_DAYS: "10"
  LOG_CLEANUP_INTERVAL_HOURS: "24"

  BODY_LIMIT: "100kb"
  API_RATE_LIMIT_WINDOW_MS: "900000"
  API_RATE_LIMIT_MAX: "200"
