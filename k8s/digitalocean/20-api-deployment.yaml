apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: votehub
spec:
  replicas: 2
  revisionHistoryLimit: 10
  progressDeadlineSeconds: 120
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: votehub-api
  template:
    metadata:
      labels:
        app: votehub-api
    spec:
      terminationGracePeriodSeconds: 30
      imagePullSecrets:
        - name: ghcr-credentials
      containers:
        - name: api
          image: ghcr.io/ahmed-elgalay-projects-collaborations/votehub-api:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3100
              name: http
          envFrom:
            - configMapRef:
                name: votehub-api-config
            - secretRef:
                name: votehub-api-secrets
          readinessProbe:
            httpGet:
              path: /api/v1/health/ready
              port: 3100
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /api/v1/health/live
              port: 3100
            initialDelaySeconds: 20
            periodSeconds: 20
            timeoutSeconds: 2
            failureThreshold: 3
          resources:
            requests:
              cpu: "150m"
              memory: "256Mi"
            limits:
              cpu: "1"
              memory: "768Mi"
