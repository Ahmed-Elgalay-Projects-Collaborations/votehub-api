groups:
  - name: votehub-security-alerts
    rules:
      - alert: VoteHubHighFailedLogins
        expr: sum(rate(votehub_login_attempts_total{outcome="failed_password"}[5m])) > 5
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High failed login rate"
          description: "Failed password logins exceeded 5/min (5m average)."

      - alert: VoteHubRateLimitTriggersSpike
        expr: sum(rate(votehub_rate_limit_triggers_total[5m])) > 1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Rate limit triggers are spiking"
          description: "Rate limit trigger events exceeded 1/min (5m average)."

      - alert: VoteHubUnauthorizedResponseSpike
        expr: sum(rate(votehub_http_responses_total{status_code=~"401|403|429"}[5m])) > 10
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Spike in 401/403/429 responses"
          description: "Unauthorized/forbidden/throttled HTTP responses exceeded 10/min."

      - alert: VoteHubSuspiciousEventsDetected
        expr: sum(increase(votehub_suspicious_events_total[10m])) > 0
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: "Suspicious events detected"
          description: "At least one suspicious event was recorded in the last 10 minutes."

      - alert: VoteHubRiskBlocksTriggered
        expr: sum(increase(votehub_risk_blocks_total[10m])) > 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Risk-based blocks triggered"
          description: "Risk engine has blocked one or more principals in the last 10 minutes."

      - alert: VoteHubRejectedVotesSpike
        expr: sum(rate(votehub_vote_submissions_total{outcome="rejected"}[10m])) > 1
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Rejected vote submissions increased"
          description: "Rejected vote rate exceeded 1/min over the last 10 minutes."
