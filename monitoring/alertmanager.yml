global:
  resolve_timeout: 5m

route:
  group_by: ["alertname", "severity"]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 2h
  receiver: default-null

receivers:
  - name: default-null

# For real notifications, replace the route receiver and add one of:
# - slack_configs
# - email_configs
# - webhook_configs
