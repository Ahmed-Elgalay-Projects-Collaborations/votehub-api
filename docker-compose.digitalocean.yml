services:
  api:
    build:
      context: .
      target: production
    env_file:
      - .env.production
    environment:
      NODE_ENV: production
      PORT: 3100
    restart: unless-stopped
    expose:
      - "3100"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3100/api/v1/health/ready"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s
    volumes:
      - api_logs:/usr/src/app/logs
    networks:
      - votehub_internal

  web:
    build:
      context: ../votehub-web
      target: production
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "80:8080"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/nginx-health"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 15s
    networks:
      - votehub_internal

  prometheus:
    image: prom/prometheus:v2.55.1
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/alerts.yml:/etc/prometheus/alerts.yml:ro
      - ./monitoring/secrets:/etc/prometheus/secrets:ro
      - prometheus_data:/prometheus
    ports:
      - "127.0.0.1:9090:9090"
    networks:
      - votehub_internal

  alertmanager:
    image: prom/alertmanager:v0.27.0
    restart: unless-stopped
    command:
      - --config.file=/etc/alertmanager/alertmanager.yml
      - --storage.path=/alertmanager
    volumes:
      - ./monitoring/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager_data:/alertmanager
    ports:
      - "127.0.0.1:9093:9093"
    networks:
      - votehub_internal

volumes:
  api_logs:
  prometheus_data:
  alertmanager_data:

networks:
  votehub_internal:
