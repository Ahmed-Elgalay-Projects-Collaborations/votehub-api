name: cd-digitalocean

on:
  push:
    branches: ["main", "master"]
  workflow_dispatch:

concurrency:
  group: cd-digitalocean-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

  build:
    runs-on: ubuntu-latest
    needs: verify
    permissions:
      contents: read
      packages: write
    outputs:
      image_ref: ${{ steps.image.outputs.image_ref }}
      image_name: ${{ steps.meta.outputs.image_name }}
      image_digest: ${{ steps.build.outputs.digest }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ secrets.GHCR_USERNAME || github.actor }}
          password: ${{ secrets.GHCR_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Resolve image name
        id: meta
        shell: bash
        run: |
          IMAGE_NAME="ghcr.io/${GITHUB_REPOSITORY,,}"
          echo "image_name=$IMAGE_NAME" >> "$GITHUB_OUTPUT"

      - name: Build and push image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          target: production
          push: true
          tags: |
            ${{ steps.meta.outputs.image_name }}:latest
            ${{ steps.meta.outputs.image_name }}:${{ github.sha }}

      - name: Build immutable image reference
        id: image
        run: echo "image_ref=${{ steps.meta.outputs.image_name }}@${{ steps.build.outputs.digest }}" >> "$GITHUB_OUTPUT"

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment: production
    env:
      DIGITALOCEAN_ACCESS_TOKEN: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}
      MONGO_URI: ${{ secrets.MONGO_URI }}
      JWT_SECRET: ${{ secrets.JWT_SECRET }}
      OTP_ENCRYPTION_KEY: ${{ secrets.OTP_ENCRYPTION_KEY }}
      VOTE_ENCRYPTION_KEY: ${{ secrets.VOTE_ENCRYPTION_KEY }}
      AUDIT_SIGNING_KEY: ${{ secrets.AUDIT_SIGNING_KEY }}
      RECEIPT_SIGNING_KEY: ${{ secrets.RECEIPT_SIGNING_KEY }}
      AUDIT_SALT: ${{ secrets.AUDIT_SALT }}
      METRICS_TOKEN: ${{ secrets.METRICS_TOKEN }}
      SMTP_HOST: ${{ secrets.SMTP_HOST }}
      SMTP_PORT: ${{ secrets.SMTP_PORT }}
      SMTP_SECURE: ${{ secrets.SMTP_SECURE }}
      SMTP_USER: ${{ secrets.SMTP_USER }}
      SMTP_PASS: ${{ secrets.SMTP_PASS }}
      SMTP_FROM: ${{ secrets.SMTP_FROM }}
      SMTP_CONNECTION_TIMEOUT_MS: ${{ secrets.SMTP_CONNECTION_TIMEOUT_MS }}
      SMTP_GREETING_TIMEOUT_MS: ${{ secrets.SMTP_GREETING_TIMEOUT_MS }}
      SMTP_SOCKET_TIMEOUT_MS: ${{ secrets.SMTP_SOCKET_TIMEOUT_MS }}
      SMTP_DNS_TIMEOUT_MS: ${{ secrets.SMTP_DNS_TIMEOUT_MS }}
      SMTP_IP_FAMILY: ${{ secrets.SMTP_IP_FAMILY }}
      DEFAULT_ADMIN_EMAIL: ${{ secrets.DEFAULT_ADMIN_EMAIL }}
      DEFAULT_ADMIN_PASSWORD: ${{ secrets.DEFAULT_ADMIN_PASSWORD }}
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: "v1.30.0"

      - name: Setup doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: Validate DigitalOcean token presence
        shell: bash
        run: |
          if [ -z "$DIGITALOCEAN_ACCESS_TOKEN" ] || [ "${#DIGITALOCEAN_ACCESS_TOKEN}" -lt 20 ]; then
            echo "DIGITALOCEAN_ACCESS_TOKEN is missing or invalid length."
            exit 1
          fi

      - name: Initialize doctl auth context
        shell: bash
        run: doctl auth init -t "$DIGITALOCEAN_ACCESS_TOKEN" >/dev/null

      - name: Verify doctl authentication
        shell: bash
        run: doctl account get >/dev/null

      - name: Configure kubeconfig
        env:
          DOKS_KUBECONFIG_B64: ${{ secrets.DOKS_KUBECONFIG_B64 }}
        shell: bash
        run: |
          if [ -z "$DOKS_KUBECONFIG_B64" ]; then
            echo "Missing GitHub secret: DOKS_KUBECONFIG_B64"
            exit 1
          fi
          mkdir -p "$HOME/.kube"
          echo "$DOKS_KUBECONFIG_B64" | base64 --decode > "$HOME/.kube/config"
          chmod 600 "$HOME/.kube/config"

      - name: Regenerate kubeconfig with short-lived DOKS credentials
        shell: bash
        run: |
          SERVER_URL="$(kubectl config view --raw --minify -o jsonpath='{.clusters[0].cluster.server}')"
          CLUSTER_ID="$(echo "$SERVER_URL" | sed -E 's#https://([^.]+)\.k8s\.ondigitalocean\.com.*#\1#')"
          if ! [[ "$CLUSTER_ID" =~ ^[0-9a-fA-F-]{36}$ ]]; then
            echo "Failed to derive a valid DOKS cluster ID from server URL: $SERVER_URL"
            exit 1
          fi
          doctl kubernetes cluster kubeconfig show "$CLUSTER_ID" --expiry-seconds 900 > "$HOME/.kube/config"
          chmod 600 "$HOME/.kube/config"

      - name: Normalize kubeconfig exec command
        shell: bash
        run: |
          sed -i -E 's#^([[:space:]]*command:[[:space:]]*).*(doctl(\.exe)?)$#\1doctl#g' "$HOME/.kube/config"
          sed -i -E '/name:[[:space:]]*DIGITALOCEAN_ACCESS_TOKEN/{N;d;}' "$HOME/.kube/config"
          sed -i -E '/^[[:space:]]*env:[[:space:]]*$/d' "$HOME/.kube/config"

      - name: Validate kubeconfig auth requirements
        shell: bash
        run: |
          if grep -q "^[[:space:]]*exec:" "$HOME/.kube/config"; then
            if ! command -v doctl >/dev/null 2>&1; then
              echo "kubeconfig uses exec auth plugin, but doctl is not installed."
              echo "Either set DIGITALOCEAN_ACCESS_TOKEN or upload a non-exec kubeconfig."
              exit 1
            fi

            if [ -z "$DIGITALOCEAN_ACCESS_TOKEN" ]; then
              echo "kubeconfig uses doctl exec auth, but DIGITALOCEAN_ACCESS_TOKEN is missing."
              echo "Add repo secret DIGITALOCEAN_ACCESS_TOKEN, or upload a static kubeconfig."
              exit 1
            fi
          fi

      - name: Verify Kubernetes API connectivity
        run: kubectl cluster-info

      - name: Validate required application secrets
        shell: bash
        run: |
          missing=0
          required=(
            MONGO_URI
            JWT_SECRET
            OTP_ENCRYPTION_KEY
            VOTE_ENCRYPTION_KEY
            AUDIT_SIGNING_KEY
            RECEIPT_SIGNING_KEY
            AUDIT_SALT
            METRICS_TOKEN
          )
          for key in "${required[@]}"; do
            if [ -z "${!key}" ]; then
              echo "Missing required GitHub secret: $key"
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Ensure votehub namespace exists
        shell: bash
        run: |
          kubectl get namespace votehub >/dev/null 2>&1 || kubectl create namespace votehub

      - name: Sync Kubernetes runtime secrets
        shell: bash
        run: |
          b64() {
            printf '%s' "$1" | base64 -w 0
          }

          smtp_port="${SMTP_PORT:-2525}"
          smtp_secure="${SMTP_SECURE:-false}"
          smtp_connection_timeout_ms="${SMTP_CONNECTION_TIMEOUT_MS:-10000}"
          smtp_greeting_timeout_ms="${SMTP_GREETING_TIMEOUT_MS:-10000}"
          smtp_socket_timeout_ms="${SMTP_SOCKET_TIMEOUT_MS:-15000}"
          smtp_dns_timeout_ms="${SMTP_DNS_TIMEOUT_MS:-10000}"
          smtp_ip_family="${SMTP_IP_FAMILY:-4}"

          cat <<EOF | kubectl apply -f -
          apiVersion: v1
          kind: Secret
          metadata:
            name: votehub-api-secrets
            namespace: votehub
          type: Opaque
          data:
            MONGO_URI: $(b64 "$MONGO_URI")
            JWT_SECRET: $(b64 "$JWT_SECRET")
            OTP_ENCRYPTION_KEY: $(b64 "$OTP_ENCRYPTION_KEY")
            VOTE_ENCRYPTION_KEY: $(b64 "$VOTE_ENCRYPTION_KEY")
            AUDIT_SIGNING_KEY: $(b64 "$AUDIT_SIGNING_KEY")
            RECEIPT_SIGNING_KEY: $(b64 "$RECEIPT_SIGNING_KEY")
            AUDIT_SALT: $(b64 "$AUDIT_SALT")
            METRICS_TOKEN: $(b64 "$METRICS_TOKEN")
            SMTP_HOST: $(b64 "$SMTP_HOST")
            SMTP_PORT: $(b64 "$smtp_port")
            SMTP_SECURE: $(b64 "$smtp_secure")
            SMTP_USER: $(b64 "$SMTP_USER")
            SMTP_PASS: $(b64 "$SMTP_PASS")
            SMTP_FROM: $(b64 "$SMTP_FROM")
            SMTP_CONNECTION_TIMEOUT_MS: $(b64 "$smtp_connection_timeout_ms")
            SMTP_GREETING_TIMEOUT_MS: $(b64 "$smtp_greeting_timeout_ms")
            SMTP_SOCKET_TIMEOUT_MS: $(b64 "$smtp_socket_timeout_ms")
            SMTP_DNS_TIMEOUT_MS: $(b64 "$smtp_dns_timeout_ms")
            SMTP_IP_FAMILY: $(b64 "$smtp_ip_family")
            DEFAULT_ADMIN_EMAIL: $(b64 "$DEFAULT_ADMIN_EMAIL")
            DEFAULT_ADMIN_PASSWORD: $(b64 "$DEFAULT_ADMIN_PASSWORD")
          EOF

          cat <<EOF | kubectl apply -f -
          apiVersion: v1
          kind: Secret
          metadata:
            name: votehub-monitoring-secrets
            namespace: votehub
          type: Opaque
          data:
            metrics_token: $(b64 "$METRICS_TOKEN")
          EOF

      - name: Apply Kubernetes manifests
        run: kubectl apply -k k8s/digitalocean

      - name: Set API image to current build
        run: kubectl -n votehub set image deployment/api api=${{ needs.build.outputs.image_ref }}

      - name: Wait for rollout
        run: kubectl -n votehub rollout status deployment/api --timeout=180s

      - name: Print deployed image
        run: kubectl -n votehub get deployment api -o=jsonpath='{.spec.template.spec.containers[0].image}'
